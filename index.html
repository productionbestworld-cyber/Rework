<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>ระบบติดตามม้วน</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --line:#334155; --txt:#e2e8f0; --mut:#94a3b8;
    --pri:#3b82f6; --in:#16a34a; --out:#f97316; --danger:#ef4444;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);
    -webkit-tap-highlight-color:transparent}
  header{background:var(--card);padding:14px 16px;position:sticky;top:0;z-index:10;
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  header h1{font-size:17px;margin:0;flex:1}
  header .who{font-size:13px;color:var(--mut)}
  main{max-width:560px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
  label{display:block;font-size:13px;color:var(--mut);margin:0 0 6px}
  select,input,button{font-size:16px;font-family:inherit}
  select,input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);
    background:#0b1220;color:var(--txt)}
  button{cursor:pointer;border:none;border-radius:10px;padding:14px;font-weight:600;color:#fff;width:100%}
  .btn-pri{background:var(--pri)}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .row{display:flex;gap:10px}
  .row>*{flex:1}
  .btn-in{background:var(--in)} .btn-out{background:var(--out)}
  #reader{width:100%;border-radius:12px;overflow:hidden}
  .rollbox{text-align:center;padding:8px 0}
  .rollbox .code{font-size:22px;font-weight:700}
  .rollbox .desc{color:var(--mut);font-size:14px;margin-top:4px}
  table.detail{width:100%;border-collapse:collapse;margin-top:6px}
  table.detail th,table.detail td{border:1px solid var(--line);padding:7px 9px;font-size:13px;text-align:left;vertical-align:top}
  table.detail th{color:var(--mut);font-weight:600;white-space:nowrap;width:38%;background:#0b1220}
  .totrow{display:flex;gap:12px;margin-bottom:14px}
  .stat{background:#0b1220;border:1px solid var(--line);border-radius:12px;padding:14px 18px;flex:1}
  .stat .k{color:var(--mut);font-size:13px}
  .stat .v{font-size:30px;font-weight:700;margin-top:4px;color:var(--in)}
  .hidden{display:none}
  .events{list-style:none;padding:0;margin:0}
  .events li{border-bottom:1px solid var(--line);padding:10px 0;font-size:14px;display:flex;gap:10px;align-items:center}
  .events li:last-child{border:none}
  .tag{font-size:12px;font-weight:700;padding:3px 8px;border-radius:6px;color:#fff;white-space:nowrap}
  .tag-in{background:var(--in)} .tag-out{background:var(--out)}
  .ev-main{flex:1}
  .ev-main .emp{font-weight:600}
  .ev-main .time{color:var(--mut);font-size:12px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:#334155;padding:12px 18px;border-radius:10px;font-size:14px;opacity:0;
    transition:.25s;pointer-events:none;z-index:50;max-width:90%}
  .toast.show{opacity:1}
  h2{font-size:15px;margin:0 0 12px}
  .muted{color:var(--mut);font-size:13px;text-align:center;padding:8px}
</style>
</head>
<body>
<header>
  <h1>📋 ระบบติดตามม้วน</h1>
  <span class="who" id="whoami"></span>
</header>
<main>

  <!-- STEP 1: เลือกพนักงาน -->
  <section id="loginCard" class="card">
    <h2>เข้าสู่ระบบ — เลือกชื่อของคุณ</h2>
    <label for="empSelect">พนักงาน</label>
    <select id="empSelect"><option value="">กำลังโหลด…</option></select>
    <div style="height:12px"></div>
    <button class="btn-pri" id="loginBtn">เข้าสู่ระบบ</button>
  </section>

  <!-- STEP 2: หน้างานของฉัน -->
  <section id="homeCard" class="card hidden">
    <div class="totrow">
      <div class="stat"><div class="k">วันนี้กรอไปแล้ว</div><div class="v" id="myCount">0</div></div>
    </div>
    <button class="btn-pri" id="scanBtn" style="background:var(--in);font-size:18px;padding:16px">📷 แสกนม้วน</button>
    <h2 style="margin-top:20px">ม้วนที่คุณหยิบไปกรอวันนี้</h2>
    <ul class="events" id="mine"><li class="muted">— ยังไม่มี —</li></ul>
  </section>

  <!-- STEP 3: แสกน -->
  <section id="scanCard" class="card hidden">
    <h2>แสกน QR ม้วนที่จะกรอ</h2>
    <div id="reader"></div>
    <p class="muted" id="scanHint">เล็งกล้องไปที่ QR บนม้วน</p>
    <div style="height:10px"></div>
    <button class="btn-ghost" id="backHomeBtn">← กลับหน้างาน</button>
  </section>

  <!-- STEP 3: ยืนยันหยิบม้วนไปกรอ -->
  <section id="rollCard" class="card hidden">
    <div class="rollbox">
      <div class="code">🧵 หยิบม้วนนี้ไปกรอ?</div>
    </div>
    <table class="detail" id="rollDetail"></table>
    <div style="height:12px"></div>
    <button class="btn-pri" id="confirmBtn" style="background:var(--in)">✅ ยืนยัน หยิบไปกรอ</button>
    <div style="height:10px"></div>
    <button class="btn-ghost" id="scanAgainBtn">ยกเลิก / แสกนม้วนอื่น</button>
  </section>

</main>
<div class="toast" id="toast"></div>

<script>
// ===== ตั้งค่า Supabase =====
const SUPABASE_URL = "https://obdhhupzwfdvroeejwji.supabase.co";
const SUPABASE_KEY = "sb_publishable_UOD2Z3KDcJ8DZTEOeyXqdg_wWySpR4B";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ฐานข้อมูลของระบบชั่งน้ำหนัก BWP (production-weight) — ใช้ดึงรายละเอียดม้วน
const PRINT_URL = "https://belwjdajuaxbhaqtlhrj.supabase.co";
const PRINT_KEY = "sb_publishable_AKuuvYnieDQzrkTyAdiKYg_tgkT2Zq-";
const sbPrint = supabase.createClient(PRINT_URL, PRINT_KEY);

// ดึง UUID ม้วนจากข้อความ QR แล้วอ่านรายละเอียด "ทั้งหมด" จากระบบชั่ง
const UUID_RE = /[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/i;
async function fetchRollDetail(code){
  const m = code.match(UUID_RE);
  if(!m) return null;
  const {data} = await sbPrint.from("production_rolls")
    .select("*").eq("id", m[0]).maybeSingle();
  return data;
}

// รายการช่องรายละเอียด (ลำดับ + ชื่อไทย) ใช้ร่วมกับหน้าผู้จัดการ
const ROLL_FIELDS = [
  ["roll_no","ม้วนที่"],["product_name","สินค้า"],["product_code","รหัสสินค้า"],
  ["item_code","Item Code"],["mat_code","Mat Code"],["lot_no","Lot No"],
  ["machine_no","เครื่องจักร"],["section","แผนก"],["customer","ลูกค้า"],["cust_code","รหัสลูกค้า"],
  ["weight","นน.สุทธิ (kg)"],["gross_weight","นน.เต็ม (kg)"],["core_weight","นน.แกน (kg)"],
  ["width_cm","หน้ากว้าง (ซม.)"],["thick_mc","ความหนา (mic)"],["length","ความยาว"],
  ["sale_order","Sale Order"],["work_order","Work Order"],["roll_type","ประเภทม้วน"],
  ["inspector","ผู้ตรวจสอบ"],["remark","หมายเหตุ"],["created_at","วันที่ผลิต"]
];
function fmtVal(k,v){
  if(v==null||v==="") return "";
  if(k==="created_at") return new Date(v).toLocaleString("th-TH",{dateStyle:"short",timeStyle:"short"});
  if(k==="roll_type") return v==="good"?"ดี":(v==="bad"?"เสีย":v);
  return v;
}

// ===== state =====
let currentEmp = null;      // {id,name}
let currentRoll = null;     // {id,roll_code,description}
let scanner = null;

const $ = id => document.getElementById(id);
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200); }
function show(id){ $(id).classList.remove("hidden"); }
function hide(id){ $(id).classList.add("hidden"); }

// ===== โหลดพนักงาน =====
async function loadEmployees(){
  const {data,error} = await sb.from("employees").select("id,name").eq("active",true).order("name");
  const sel = $("empSelect");
  if(error){ sel.innerHTML='<option value="">โหลดไม่สำเร็จ</option>'; toast("โหลดพนักงานไม่สำเร็จ"); return; }
  sel.innerHTML = '<option value="">— เลือกชื่อ —</option>' +
    data.map(e=>`<option value="${e.id}" data-name="${e.name}">${e.name}</option>`).join("");
  // เข้าหน้าทุกครั้งต้องเลือกชื่อก่อน (ไม่ auto-login) — แต่ช่วยเลือกชื่อล่าสุดไว้ให้
  const saved = JSON.parse(localStorage.getItem("emp")||"null");
  if(saved && [...sel.options].some(o=>o.value===saved.id)) sel.value=saved.id;
}

$("loginBtn").onclick = ()=>{
  const sel=$("empSelect"), opt=sel.selectedOptions[0];
  if(!sel.value){ toast("กรุณาเลือกชื่อก่อน"); return; }
  currentEmp={id:sel.value,name:opt.dataset.name};
  localStorage.setItem("emp",JSON.stringify(currentEmp));
  afterLogin();
};

function afterLogin(){
  $("whoami").textContent="👤 "+currentEmp.name;
  hide("loginCard"); goHome();
}
// หน้างานของฉัน (ไม่เปิดกล้อง)
function goHome(){
  stopScanner();
  hide("scanCard"); hide("rollCard"); show("homeCard");
  loadMine();
}
$("scanBtn").onclick=()=>{ hide("homeCard"); show("scanCard"); startScanner(); };
$("backHomeBtn").onclick=goHome;

// ===== QR scanner =====
function startScanner(){
  if(scanner) return;
  scanner = new Html5Qrcode("reader");
  scanner.start({facingMode:"environment"}, {fps:10, qrbox:{width:230,height:230}},
    onScan, ()=>{}).catch(err=>{
      $("scanHint").textContent="เปิดกล้องไม่ได้ — ตรวจสอบสิทธิ์กล้อง แล้วลองใหม่";
      toast("เปิดกล้องไม่ได้ — โปรดอนุญาตใช้กล้อง");
    });
}
async function stopScanner(){
  if(scanner){ try{ await scanner.stop(); }catch(e){} scanner=null; }
}

let lastScan=0;
function onScan(text){
  const now=Date.now();
  if(now-lastScan<1500) return;   // กันแสกนซ้ำถี่
  lastScan=now;
  handleRollCode(text.trim());
}

// ===== หา/สร้างม้วนจากข้อมูล QR แล้วให้ยืนยัน =====
async function handleRollCode(code){
  if(!code) return;
  await stopScanner();
  // ดึงรายละเอียดม้วนจากระบบชั่ง
  const detail = await fetchRollDetail(code);
  let {data:roll} = await sb.from("rolls").select("*").eq("roll_code",code).maybeSingle();
  // snapshot: เก็บทั้งก้อนใน detail + คอลัมน์หลักไว้ทำสรุป/เรียง
  const snap = detail ? {
    detail,
    roll_no:detail.roll_no, lot_no:detail.lot_no, machine_no:detail.machine_no,
    product_name:detail.product_name, item_code:detail.item_code,
    weight:detail.weight, customer:detail.customer,
    description:[detail.product_name, detail.lot_no?("Lot "+detail.lot_no):null].filter(Boolean).join(" · ")
  } : {};
  if(!roll){
    const {data:created,error} = await sb.from("rolls").insert({roll_code:code, ...snap}).select().single();
    if(error){ toast("อ่านม้วนไม่สำเร็จ"); startScanner(); return; }
    roll=created;
  } else if(detail){
    await sb.from("rolls").update(snap).eq("id",roll.id);
    Object.assign(roll, snap);
  }
  currentRoll=roll;
  renderDetail(roll);
  hide("scanCard"); show("rollCard");
}

// แสดงรายละเอียดม้วนทั้งหมดในหน้ายืนยัน
function renderDetail(roll){
  const d=roll.detail||{};
  const rows=ROLL_FIELDS
    .map(([k,label])=>[label,fmtVal(k,d[k])])
    .filter(([,v])=>v!=="");
  const tbl=$("rollDetail");
  if(rows.length){
    tbl.innerHTML=rows.map(([l,v])=>`<tr><th>${l}</th><td>${v}</td></tr>`).join("");
  } else {
    tbl.innerHTML=`<tr><th>ม้วน</th><td>${roll.roll_code}</td></tr>`;
  }
}

// ===== บันทึกว่าหยิบม้วนไปกรอ =====
async function confirmPick(){
  if(!currentRoll||!currentEmp) return;
  $("confirmBtn").disabled=true;
  const {error}=await sb.from("roll_events").insert({
    roll_id:currentRoll.id, employee_id:currentEmp.id, action:'กรอ'
  });
  $("confirmBtn").disabled=false;
  if(error){ toast("บันทึกไม่สำเร็จ"); return; }
  toast("✅ บันทึกแล้ว — หยิบไปกรอ");
  currentRoll=null;
  goHome();   // กลับหน้างานของฉัน
}
$("confirmBtn").onclick=confirmPick;
$("scanAgainBtn").onclick=()=>{ currentRoll=null; hide("rollCard"); show("scanCard"); startScanner(); };

// ===== ม้วนที่ฉันหยิบไปกรอวันนี้ =====
async function loadMine(){
  const ul=$("mine"); ul.innerHTML='<li class="muted">— กำลังโหลด —</li>';
  const since=new Date(); since.setHours(0,0,0,0);
  const {data,error}=await sb.from("roll_events")
    .select("created_at,rolls(roll_code,roll_no,lot_no,machine_no,product_name,weight)")
    .eq("employee_id",currentEmp.id).gte("created_at",since.toISOString())
    .order("created_at",{ascending:false}).limit(100);
  if(error){ ul.innerHTML='<li class="muted">โหลดไม่สำเร็จ</li>'; return; }
  $("myCount").textContent=data.length;
  if(!data.length){ ul.innerHTML='<li class="muted">— ยังไม่มี —</li>'; return; }
  ul.innerHTML=data.map(ev=>{
    const t=new Date(ev.created_at).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
    const r=ev.rolls||{};
    const parts=[];
    if(r.roll_no!=null) parts.push("ม้วน "+r.roll_no);
    if(r.product_name) parts.push(r.product_name);
    if(r.lot_no) parts.push("Lot "+r.lot_no);
    if(r.machine_no) parts.push(r.machine_no);
    const label=parts.length?parts.join(" · "):(r.roll_code||"");
    return `<li><span class="tag tag-in">กรอ</span><div class="ev-main">
      <div class="emp">${label}</div><div class="time">${t}</div></div></li>`;
  }).join("");
}

// logout: กดที่ชื่อ
$("whoami").onclick=()=>{
  if(confirm("ออกจากระบบ?")){ localStorage.removeItem("emp"); location.reload(); }
};

loadEmployees();
</script>
</body>
</html>
