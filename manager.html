<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>สรุปผลงานกรอ — ผู้จัดการ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0f172a;--panel:#1e293b;--line:#cbd5e1;--txt:#0f172a;--mut:#64748b;
    --pri:#2563eb;--head:#1e293b;--zebra:#f1f5f9;--hover:#dbeafe}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:#0f172a;color:#e2e8f0}
  header{background:var(--panel);padding:12px 16px;border-bottom:1px solid #334155;
    position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;flex:1;min-width:160px}
  .btn{background:transparent;border:1px solid #475569;color:#e2e8f0;border-radius:8px;
    padding:8px 12px;cursor:pointer;font-family:inherit;font-size:14px}
  .btn.pri{background:#16a34a;border-color:#16a34a;color:#fff;font-weight:600}
  main{max-width:1000px;margin:0 auto;padding:14px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .chip{padding:7px 15px;border-radius:999px;border:1px solid #475569;background:transparent;
    color:#e2e8f0;cursor:pointer;font-size:14px;font-family:inherit}
  .chip.active{background:var(--pri);border-color:var(--pri);color:#fff;font-weight:600}
  .meta{color:#94a3b8;font-size:13px;margin:0 0 10px}
  /* ตารางแบบ Excel */
  .sheet{background:#fff;border-radius:6px;overflow:auto;border:1px solid var(--line);margin-bottom:20px}
  table{width:100%;border-collapse:collapse;color:var(--txt);font-size:14px;min-width:520px}
  th,td{border:1px solid var(--line);padding:8px 10px;text-align:left;white-space:nowrap}
  thead th{position:sticky;top:0;background:var(--head);color:#fff;font-weight:600;z-index:1}
  tbody tr:nth-child(even){background:var(--zebra)}
  tbody tr:hover{background:var(--hover)}
  td.c{text-align:center} td.r{text-align:right;font-variant-numeric:tabular-nums}
  .idx{color:var(--mut);text-align:center;width:44px}
  .total td{font-weight:700;background:#e2e8f0}
  a{color:var(--pri)}
  .muted{color:var(--mut);text-align:center;padding:16px}
  h2{font-size:14px;margin:18px 0 8px;color:#e2e8f0}
  .empmgr{background:var(--panel);border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:8px}
  .addrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .addrow input{flex:1;min-width:140px;padding:9px 12px;border-radius:8px;border:1px solid #475569;
    background:#0b1220;color:#e2e8f0;font-family:inherit;font-size:14px}
  .emplist{list-style:none;margin:0;padding:0}
  .emplist li{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid #334155;font-size:14px;color:#e2e8f0}
  .emplist li:last-child{border:none}
  .emplist .nm{flex:1}
  .emplist .cd{color:#94a3b8;font-size:12px}
  .del{background:transparent;border:1px solid #b91c1c;color:#f87171;border-radius:8px;
    padding:5px 12px;cursor:pointer;font-family:inherit;font-size:13px}
</style>
</head>
<body>
<header>
  <h1>📊 สรุปผลงานกรอ</h1>
  <button class="btn" id="refreshBtn">↻ รีเฟรช</button>
  <button class="btn pri" id="exportBtn">⬇️ ดาวน์โหลด Excel</button>
</header>
<main>
  <div class="filters" id="filters">
    <button class="chip active" data-range="today">วันนี้</button>
    <button class="chip" data-range="week">7 วัน</button>
    <button class="chip" data-range="month">30 วัน</button>
    <button class="chip" data-range="all">ทั้งหมด</button>
  </div>
  <p class="meta" id="meta">—</p>

  <h2>จัดการพนักงาน</h2>
  <div class="empmgr">
    <div class="addrow">
      <input id="empName" placeholder="ชื่อพนักงานใหม่" />
      <input id="empCode" placeholder="รหัส (ถ้ามี)" style="max-width:120px" />
      <button class="btn pri" id="addEmpBtn">+ เพิ่ม</button>
    </div>
    <ul class="emplist" id="empList"><li class="muted">— กำลังโหลด —</li></ul>
  </div>

  <h2>สรุปรายคน</h2>
  <div class="sheet">
    <table>
      <thead><tr><th class="idx">#</th><th>พนักงาน</th><th>จำนวนม้วนที่กรอ</th></tr></thead>
      <tbody id="byEmp"><tr><td colspan="3" class="muted">— กำลังโหลด —</td></tr></tbody>
    </table>
  </div>

  <h2>รายละเอียดทั้งหมด</h2>
  <div class="sheet">
    <table>
      <thead><tr id="logHead"></tr></thead>
      <tbody id="log"><tr><td class="muted">— กำลังโหลด —</td></tr></tbody>
    </table>
  </div>
</main>

<script>
const SUPABASE_URL="https://obdhhupzwfdvroeejwji.supabase.co";
const SUPABASE_KEY="sb_publishable_UOD2Z3KDcJ8DZTEOeyXqdg_wWySpR4B";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const $=id=>document.getElementById(id);
let range="today";
let rows=[];   // เก็บข้อมูลดิบไว้ export

// ช่องรายละเอียดม้วนทั้งหมด (ลำดับ + ชื่อไทย)
const ROLL_FIELDS = [
  ["roll_no","ม้วนที่"],["product_name","สินค้า"],["product_code","รหัสสินค้า"],
  ["item_code","Item Code"],["mat_code","Mat Code"],["lot_no","Lot No"],
  ["machine_no","เครื่องจักร"],["section","แผนก"],["customer","ลูกค้า"],["cust_code","รหัสลูกค้า"],
  ["weight","นน.สุทธิ (kg)"],["gross_weight","นน.เต็ม (kg)"],["core_weight","นน.แกน (kg)"],
  ["width_cm","หน้ากว้าง (ซม.)"],["thick_mc","ความหนา (mic)"],["length","ความยาว"],
  ["sale_order","Sale Order"],["work_order","Work Order"],["roll_type","ประเภทม้วน"],
  ["inspector","ผู้ตรวจสอบ"],["remark","หมายเหตุ"],["created_at","วันที่ผลิต"]
];
function fmtVal(k,v){
  if(v==null||v==="") return "";
  if(k==="created_at") return new Date(v).toLocaleString("th-TH",{dateStyle:"short",timeStyle:"short"});
  if(k==="roll_type") return v==="good"?"ดี":(v==="bad"?"เสีย":v);
  return v;
}
// ดึงค่า field จากแถว event (จาก detail ก่อน ถ้าไม่มีใช้คอลัมน์หลัก)
function fld(ev,k){ const d=ev.rolls?.detail||{}; const v=(d[k]!=null&&d[k]!=="")?d[k]:ev.rolls?.[k]; return v; }

function sinceISO(r){
  const d=new Date();
  if(r==="today") d.setHours(0,0,0,0);
  else if(r==="week") d.setDate(d.getDate()-7);
  else if(r==="month") d.setDate(d.getDate()-30);
  else return null;
  return d.toISOString();
}
const rangeLabel={today:"วันนี้",week:"7 วันล่าสุด",month:"30 วันล่าสุด",all:"ทั้งหมด"};

async function load(){
  $("byEmp").innerHTML='<tr><td colspan="3" class="muted">— กำลังโหลด —</td></tr>';
  $("log").innerHTML='<tr><td colspan="5" class="muted">— กำลังโหลด —</td></tr>';
  let q=sb.from("roll_events")
    .select("created_at,reason,employees(name),rolls(roll_code,roll_no,lot_no,machine_no,product_name,weight,customer,detail)")
    .eq("action","กรอ").order("created_at",{ascending:false}).limit(2000);
  const s=sinceISO(range); if(s) q=q.gte("created_at",s);
  const {data,error}=await q;
  if(error){ $("log").innerHTML='<tr><td colspan="10" class="muted">โหลดไม่สำเร็จ</td></tr>'; return; }
  rows=data;

  // สรุปรายคน
  const counts={};
  data.forEach(ev=>{ const n=ev.employees?.name||"?"; counts[n]=(counts[n]||0)+1; });
  const emps=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  $("meta").textContent=`ช่วง: ${rangeLabel[range]} · รวม ${data.length} ม้วน · ${emps.length} คน`;
  $("byEmp").innerHTML = emps.length
    ? emps.map(([n,c],i)=>`<tr><td class="idx">${i+1}</td><td>${n}</td><td class="r">${c}</td></tr>`).join("")
      + `<tr class="total"><td></td><td>รวม</td><td class="r">${data.length}</td></tr>`
    : '<tr><td colspan="3" class="muted">— ไม่มีข้อมูล —</td></tr>';

  // หัวตาราง: # / บันทึกเมื่อ / พนักงาน / แล้วตามด้วยทุก field ของม้วน
  $("logHead").innerHTML =
    '<th class="idx">#</th><th>บันทึกเมื่อ</th><th>พนักงาน</th><th>เหตุผล (ม้วนเป็นอะไร)</th>'
    + ROLL_FIELDS.map(([,label])=>`<th>${label}</th>`).join("");

  const dash=v=>(v==null||v==="")?"–":v;
  const colspan=4+ROLL_FIELDS.length;
  $("log").innerHTML = data.length
    ? data.map((ev,i)=>{
        const d=new Date(ev.created_at);
        const when=d.toLocaleString("th-TH",{dateStyle:"short",timeStyle:"short"});
        const cells=ROLL_FIELDS.map(([k])=>`<td>${dash(fmtVal(k,fld(ev,k)))}</td>`).join("");
        return `<tr><td class="idx">${i+1}</td><td class="c">${when}</td>`
          +`<td>${ev.employees?.name||"?"}</td><td>${dash(ev.reason)}</td>${cells}</tr>`;
      }).join("")
    : `<tr><td colspan="${colspan}" class="muted">— ไม่มีข้อมูล —</td></tr>`;
}

// export เป็น CSV (เปิดใน Excel ได้ ภาษาไทยไม่เพี้ยนด้วย BOM)
function exportCSV(){
  if(!rows.length){ alert("ไม่มีข้อมูลให้ดาวน์โหลด"); return; }
  const head=["ลำดับ","วันที่","เวลา","พนักงาน","เหตุผล (ม้วนเป็นอะไร)",...ROLL_FIELDS.map(([,l])=>l)];
  const esc=v=>`"${String(v??"").replace(/"/g,'""')}"`;
  const lines=[head.map(esc).join(",")];
  rows.forEach((ev,i)=>{
    const d=new Date(ev.created_at);
    lines.push([i+1,
      d.toLocaleDateString("th-TH"),
      d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}),
      ev.employees?.name||"", ev.reason||"",
      ...ROLL_FIELDS.map(([k])=>fmtVal(k,fld(ev,k)))
    ].map(esc).join(","));
  });
  const blob=new Blob(["﻿"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`ผลงานกรอ_${range}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
}

// ===== จัดการพนักงาน =====
async function loadEmps(){
  const ul=$("empList"); ul.innerHTML='<li class="muted">— กำลังโหลด —</li>';
  const {data,error}=await sb.from("employees").select("id,name,code")
    .eq("active",true).order("name");
  if(error){ ul.innerHTML='<li class="muted">โหลดไม่สำเร็จ</li>'; return; }
  if(!data.length){ ul.innerHTML='<li class="muted">— ยังไม่มีพนักงาน —</li>'; return; }
  ul.innerHTML="";
  data.forEach(e=>{
    const li=document.createElement("li");
    li.innerHTML=`<span class="nm">${e.name}</span>`
      +(e.code?`<span class="cd">${e.code}</span>`:"")
      +`<button class="del">ลบ</button>`;
    li.querySelector(".del").onclick=()=>removeEmp(e);
    ul.appendChild(li);
  });
}
async function addEmp(){
  const name=$("empName").value.trim();
  const code=$("empCode").value.trim()||null;
  if(!name){ alert("กรุณากรอกชื่อ"); return; }
  const {error}=await sb.from("employees").insert({name,code});
  if(error){ alert("เพิ่มไม่สำเร็จ"+(error.code==="23505"?" (รหัสซ้ำ)":"")); return; }
  $("empName").value=""; $("empCode").value="";
  loadEmps();
}
async function removeEmp(e){
  if(!confirm(`ลบพนักงาน "${e.name}" ออกจากรายชื่อ?\n(ประวัติงานเก่ายังอยู่)`)) return;
  const {error}=await sb.from("employees").update({active:false}).eq("id",e.id);
  if(error){ alert("ลบไม่สำเร็จ"); return; }
  loadEmps();
}
$("addEmpBtn").onclick=addEmp;
$("empName").addEventListener("keydown",e=>{ if(e.key==="Enter") addEmp(); });

$("filters").addEventListener("click",e=>{
  const b=e.target.closest(".chip"); if(!b) return;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  b.classList.add("active"); range=b.dataset.range; load();
});
$("refreshBtn").onclick=()=>{ load(); loadEmps(); };
$("exportBtn").onclick=exportCSV;
load(); loadEmps();
</script>
</body>
</html>
